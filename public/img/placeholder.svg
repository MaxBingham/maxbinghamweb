<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="placeholder image">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <g fill="#92400e" font-family="ui-sans-serif, system-ui, sans-serif">
    <text x="40" y="70" font-size="22" font-weight="600">visuals / placeholder</text>
    <text x="40" y="460" font-size="16" opacity="0.75">replace me with a real image</text>
  </g>
  <g stroke="#92400e" stroke-width="1" opacity="0.35" fill="none">
